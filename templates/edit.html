<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 15px;
        }
        .form-label {
            font-weight: 600;
        }
        .btn-custom {
            width: 100%;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-4">✏️ Edit Employee</h3>

               <form method="POST">

    <div class="row">
        <!-- Name -->
        <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input class="form-control mb-3" name="name" value="{{ emp[1] }}" required>
        </div>

        <!-- Email -->
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input class="form-control mb-3" type="email" name="email" value="{{ emp[2] }}" required>
        </div>
    </div>

    <div class="row">
        <!-- Phone -->
        <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input class="form-control mb-3" name="phone" value="{{ emp[3] }}" required>
        </div>

        <!-- Employee Code -->
        <div class="col-md-6">
            <label class="form-label">Employee Code</label>
            <input class="form-control mb-3" name="employee_code" value="{{ emp[4] }}" required>
        </div>
    </div>

    <div class="row">
        <!-- Salary -->
        <div class="col-md-6">
            <label class="form-label">Salary</label>
            <input class="form-control mb-3" type="number" name="salary" value="{{ emp[5] }}" required>
        </div>

        <!-- Join Date -->
        <div class="col-md-6">
            <label class="form-label">Join Date</label>
            <input class="form-control mb-3" type="date" name="join_date" value="{{ emp[6] }}" required>
        </div>
    </div>

    <!-- Buttons -->
    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success w-100">Update Employee</button>
        <a href="/dashboard" class="btn btn-secondary w-100">Cancel</a>
    </div>

</form>
            </div>

        </div>
    </div>
</div>

</body>
</html>

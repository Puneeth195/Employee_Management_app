<!DOCTYPE html>
<html>
<head>
    <title>Add Employee</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            border-radius: 12px;
        }
        .error {
            color: red;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="card shadow p-4">
                <h3 class="text-center mb-4">➕ Add Employee</h3>

                <form method="POST" onsubmit="return validateForm()">

                    <!-- Row 1 -->
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input class="form-control" id="name" name="name">
                            <div class="error" id="nameError">Name is required</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                           <input class="form-control" id="email" name="email" type="email">
                           <div class="error" id="emailError">Enter a valid email (example@gmail.com)</div>
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="row mt-2">
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input class="form-control" id="phone" name="phone" maxlength="10">
                            <div class="error" id="phoneError">Phone must be exactly 10 digits</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Employee Code</label>
                            <input class="form-control" id="emp_code" name="employee_code">
                            <div class="error" id="codeError">Only numbers allowed</div>
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="row mt-2">
                        <div class="col-md-6">
                            <label class="form-label">Salary</label>
                            <input class="form-control" id="salary" name="salary">
                            <div class="error" id="salaryError">Enter valid salary</div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Join Date</label>
                            <input class="form-control" type="date" id="date" name="join_date">
                            <div class="error" id="dateError">Select join date</div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success w-100">Save</button>
                        <a href="/dashboard" class="btn btn-secondary w-100">Back</a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

<script>
function validateForm() {

    let valid = true;

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    
    let phone = document.getElementById("phone").value.trim();
    let code = document.getElementById("emp_code").value.trim();
    let salary = document.getElementById("salary").value.trim();
    let date = document.getElementById("date").value;

    document.querySelectorAll(".error").forEach(e => e.style.display = "none");

    // Name
    if (name === "") {
        showError("nameError");
        valid = false;
    }

    // 🔥 Strong Email Validation
    let emailPattern = /^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$/;
    if (!emailPattern.test(email)) {
        showError("emailError");
        valid = false;
    }

    // 🔥 Phone Validation (only digits + 10 length)
    if (!/^[0-9]{10}$/.test(phone)) {
        showError("phoneError");
        valid = false;
    }

    // 🔥 Employee Code (only numbers)
    if (!/^[0-9]+$/.test(code)) {
        showError("codeError");
        valid = false;
    }

    // Salary
    if (salary === "" || isNaN(salary)) {
        showError("salaryError");
        valid = false;
    }

    // Date
    if (date === "") {
        showError("dateError");
        valid = false;
    }

    return valid;
}

// Show error
function showError(id) {
    document.getElementById(id).style.display = "block";
}

// 🔥 Restrict input while typing

// Phone → only digits
document.getElementById("phone").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, '');
});

// Employee Code → only digits
document.getElementById("emp_code").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, '');
});

// Remove error instantly
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", () => {
        let error = input.nextElementSibling;
        if (error) error.style.display = "none";
    });
});
</script>

</body>
</html>

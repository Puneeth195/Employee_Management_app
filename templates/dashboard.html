<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h2>Employee Dashboard</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <!-- SEARCH -->
    <form class="my-3">
        <input type="text" name="search" placeholder="Search by name" class="form-control">
    </form>

    <a href="/add" class="btn btn-success mb-3">+ Add Employee</a>

    <table class="table table-bordered table-striped shadow">
        <tr>
            <th>Name</th><th>Email</th><th>Phone</th>
            <th>Salary</th><th>Join Date</th><th>Emp Code</th><th>Actions</th>
        </tr>

        {% for emp in employees %}
        <tr>
            <td>{{ emp[1] }}</td>
            <td>{{ emp[2] }}</td>
            <td>{{ emp[3] }}</td>
            <td>{{ emp[4] }}</td>
            <td>{{ emp[5] }}</td>
            <td>{{ emp[6] }}</td>
            <td>
                <a href="/edit/{{ emp[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ emp[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
